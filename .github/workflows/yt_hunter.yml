name: YouTube ID Hunter (Auto & Manual)

on:
  push:
    paths:
      - 'accounts.json' # 🔥 This tells it to run automatically whenever you edit the accounts file!
  workflow_dispatch: # Keeps the manual button just in case

permissions:
  contents: write

jobs:
  hunt-ids:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # ⬆️ Upgraded to 3.11 to remove that Google warning

      - name: Install Dependencies
        run: |
          pip install google-api-python-client

      - name: Run ID Hunter Script
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
        run: python yt_id_hunter.py

      - name: Commit and Push New IDs
        run: |
          git config --global user.name "Fr0zen-Hunter-Bot"
          git config --global user.email "hunter@fr0zen.waffle"
          git add accounts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Locked in new YouTube IDs" && git push)
