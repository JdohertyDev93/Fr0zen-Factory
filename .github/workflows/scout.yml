name: Fr0zen Scout 24/7

on:
  schedule:
    - cron: '*/5 * * * *' # Backup schedule
  repository_dispatch:
    types: [heartbeat] # This is the "shout" it will listen for
  workflow_dispatch: # Allows manual button click

  # ⚠️ ADD THIS: Gives the script permission to write to your repo
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests google-api-python-client

      - name: Run Fr0zen Scout
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
          TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scout.py
