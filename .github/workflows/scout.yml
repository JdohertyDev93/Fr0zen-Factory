name: Fr0zen Scout

on:
  schedule:
    - cron: '*/30 * * * *' # Runs every 30 minutes
  workflow_dispatch: # Adds a button so you can test it manually

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows GitHub to save the "memory" file

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-api-python-client requests

      - name: Run Fr0zen Scout
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scout.py

      - name: Save Memory
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Fr0zen AI: Updated tracked videos"
